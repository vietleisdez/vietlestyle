<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adidas adiClub Days</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <section class="banner-grid">
            <div class="column">
                <img src="link_anh_1.jpg" alt="Adidas 1">
                <div class="text-box">
                    <h2 class="title-bg">NƠI DÀNH CHO TẤT CẢ HỘI VIÊN</h2>
                    <p class="desc-bg">Bộ sưu tập độc quyền trong Tuần lễ Hội viên adiClub Days.<br>Sở hữu những lựa chọn tốt nhất ngay hôm nay.</p>
                    <div class="btns">
                        <a href="#">THAM GIA NGAY &rarr;</a>
                        <a href="#">ĐÃ THAM GIA? &rarr;</a>
                    </div>
                </div>
            </div>

            <div class="column">
                <img src="link_anh_2.jpg" alt="Adidas 2">
                <div class="logo-center">
                    <img src="logo-adiclub-days.png" alt="adiClub DAYS">
                    </div>
            </div>

            <div class="column">
                <img src="link_anh_3.jpg" alt="Adidas 3">
            </div>
        </section>

        <div class="green-footer"></div>
    </div>

</body>
</html>
<style>
     * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Helvetica', Arial, sans-serif;
}

.main-wrapper {
    width: 100%;
    overflow: hidden;
}

.banner-grid {
    display: flex; /* Kích hoạt hàng ngang */
    width: 100%;
    height: 85vh; /* Chiều cao vùng ảnh */
}

.column {
    flex: 1; /* Chia đều 3 cột bằng nhau */
    position: relative;
    overflow: hidden;
    border-right: 2px solid transparent; /* Tạo khoảng cách cực nhỏ nếu muốn */
}

.column img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Giữ tỉ lệ ảnh không bị móp */
    display: block;
}

/* Phần chữ ở góc trái dưới */
.text-box {
    position: absolute;
    bottom: 40px;
    left: 40px;
    z-index: 10;
    max-width: 450px;
}

.title-bg {
    background-color: white;
    padding: 5px 10px;
    display: table; /* Để background ôm sát chữ */
    font-size: 1.5rem;
    font-weight: bold;
    margin-bottom: 2px;
}

.desc-bg {
    background-color: white;
    padding: 5px 10px;
    display: table;
    font-size: 0.9rem;
    line-height: 1.4;
    margin-bottom: 15px;
}

/* Nút bấm */
.btns {
    display: flex;
    gap: 10px;
}

.btns a {
    background: white;
    color: black;
    text-decoration: none;
    padding: 12px 20px;
    font-weight: bold;
    font-size: 0.8rem;
    border: 1px solid #000;
    transition: 0.3s;
}

.btns a:hover {
    background: black;
    color: white;
}

/* Logo ở cột giữa */
.logo-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80%; /* Điều chỉnh tùy kích thước logo */
    text-align: center;
}

.logo-center img {
    width: 100%;
    height: auto;
}

/* Thanh màu xanh phía dưới */
.green-footer {
    width: 100%;
    height: 15vh;
    background-color: #467865; /* Màu xanh đậm như hình */
}
