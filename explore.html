<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* ĐÂY LÀ PHẦN QUAN TRỌNG NHẤT ĐỂ CHẠY NGANG */
        .banner-grid {
            display: flex;       /* Lệnh này bắt buộc các con phải nằm ngang */
            flex-direction: row; /* Đảm bảo chiều là hàng ngang */
            width: 100%;
            height: 500px;       /* Chiều cao cố định để dễ kiểm tra */
            background: #eee;
        }

        .column {
            flex: 1;             /* Chia đều mỗi ảnh chiếm 1/3 chiều ngang */
            position: relative;
            border: 1px solid white; /* Đường kẻ trắng giữa các ảnh */
        }

        .column img {
            width: 100%;
            height: 100%;
            object-fit: cover;   /* Giúp ảnh không bị móp méo */
        }

        /* Chữ đè lên ảnh */
        .text-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 10px;
            font-family: sans-serif;
            font-weight: bold;
        }

        /* Thanh màu xanh dưới cùng */
        .green-bar {
            height: 60px;
            background-color: #467865;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="banner-grid">
        <div class="column">
            <img src="https://brand.assets.adidas.com/image/upload/f_auto,q_auto,fl_lossy/viVN/Images/adiclub-days-sept-vlc-hp-glp-teaser-carousel-d_tcm209-1065171.jpg">
            <div class="text-overlay">NƠI DÀNH CHO TẤT CẢ HỘI VIÊN</div>
        </div>

        <div class="column">
            <img src="https://brand.assets.adidas.com/image/upload/f_auto,q_auto,fl_lossy/viVN/Images/adiclub-days-sept-vlc-hp-glp-teaser-carousel-d-2_tcm209-1065174.jpg">
        </div>

        <div class="column">
            <img src="https://brand.assets.adidas.com/image/upload/f_auto,q_auto,fl_lossy/viVN/Images/adiclub-days-sept-vlc-hp-glp-teaser-carousel-d-3_tcm209-1065178.jpg">
        </div>
    </div>

    <div class="green-bar"></div>

</body>
</html>
